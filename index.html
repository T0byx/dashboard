<!DOCTYPE html>
<html lang="cs" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Outfit:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
[data-theme="dark"]{
  --bg:#07080e;--bg2:#0d0e16;--surf:#13141d;--surf2:#1a1c28;--surf3:#22253a;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.14);
  --text:#e6e8f4;--text2:#7a80a0;--text3:#40465c;
  --acc:#6c63ff;--acc2:#f472b6;--teal:#2dd4bf;--amber:#fbbf24;
  --glow:rgba(108,99,255,0.28);
}
[data-theme="light"]{
  --bg:#eef0fa;--bg2:#e4e6f5;--surf:#ffffff;--surf2:#f3f4fb;--surf3:#e4e6f4;
  --border:rgba(0,0,0,0.07);--border2:rgba(0,0,0,0.14);
  --text:#1a1c2e;--text2:#5a6080;--text3:#a0a8c8;
  --acc:#5b52ee;--acc2:#db2777;--teal:#0d9488;--amber:#d97706;
  --glow:rgba(91,82,238,0.18);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Outfit',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;transition:background .3s,color .3s}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--surf3);border-radius:4px}

/* ── STARS (dark only) ── */
.sky{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.s1,.s2,.s3{position:absolute;top:0;left:0;border-radius:50%;will-change:transform}

@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(-25px,-18px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(18px,-22px)}}
[data-theme="light"] .sky{opacity:0}

/* ── LIGHT BG blobs (pure radial-gradient, no blur) ── */
.lgbg{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0;transition:opacity .4s}
[data-theme="light"] .lgbg{opacity:1}
.lgbg::before{content:"";position:absolute;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle at center,rgba(108,99,255,.13) 0%,transparent 70%);top:-200px;left:-150px}
.lgbg::after{content:"";position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle at center,rgba(244,114,182,.1) 0%,transparent 70%);bottom:-150px;right:-100px}

/* LOGIN */
#login{position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:var(--bg);transition:opacity .35s}
.theme-login{position:fixed;top:18px;right:18px;z-index:1000;width:38px;height:38px;border-radius:10px;background:var(--surf2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;transition:transform .2s}
.theme-login:hover{transform:scale(1.12) rotate(12deg)}
.lcard{width:400px;background:var(--surf);border:1px solid var(--border2);border-radius:20px;padding:48px 44px;position:relative;box-shadow:0 24px 60px rgba(0,0,0,0.4)}
.lbar{position:absolute;top:0;left:36px;right:36px;height:2px;background:linear-gradient(90deg,var(--acc),var(--acc2));border-radius:0 0 4px 4px}
.ltag{font-family:'DM Mono',monospace;font-size:10px;color:var(--acc);letter-spacing:4px;text-transform:uppercase;margin-bottom:22px;display:flex;align-items:center;gap:8px}
.ltag::before{content:"";width:18px;height:1px;background:var(--acc)}
.lh{font-size:32px;font-weight:900;margin-bottom:30px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.lf{margin-bottom:14px}
.lf label{display:block;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:7px}
.lf input{width:100%;background:var(--surf2);border:1px solid var(--border);color:var(--text);padding:12px 15px;font-family:'DM Mono',monospace;font-size:14px;outline:none;border-radius:11px;transition:border-color .2s,box-shadow .2s}
.lf input:focus{border-color:var(--acc);box-shadow:0 0 0 3px var(--glow)}
.lbtn{width:100%;margin-top:22px;padding:13px;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;color:#fff;font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;cursor:pointer;border-radius:11px;transition:opacity .2s,transform .15s;box-shadow:0 6px 20px var(--glow)}
.lbtn:hover{opacity:.88;transform:translateY(-1px)}
.lbtn:active{transform:translateY(1px)}
.lerr{display:none;margin-top:10px;font-family:'DM Mono',monospace;font-size:11px;color:var(--acc2);text-align:center}
.pw-wrap{position:relative}
.pw-wrap input{padding-right:44px}
.pw-eye{position:absolute;right:0;top:0;bottom:0;width:42px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--text3);font-size:16px;transition:color .2s;background:none;border:none}
.pw-eye:hover{color:var(--acc)}
.remember{display:flex;align-items:center;gap:8px;margin-top:16px;font-family:'DM Mono',monospace;font-size:11px;color:var(--text2);cursor:pointer;user-select:none}
.remember input{width:14px;height:14px;accent-color:var(--acc);cursor:pointer}

/* APP */
#app{display:none;position:relative;z-index:1}
header{display:flex;align-items:center;gap:14px;padding:0 24px;height:58px;background:var(--surf);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;transition:background .3s}
.h-logo{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:7px}
.h-dot{width:6px;height:6px;border-radius:50%;background:var(--teal);animation:blink 2s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.4}}
.h-right{display:flex;align-items:center;gap:8px;margin-left:auto}
.h-clock{font-family:'DM Mono',monospace;font-size:12px;color:var(--text2)}
.h-theme{width:34px;height:34px;border-radius:9px;background:var(--surf2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:15px;transition:transform .2s}
.h-theme:hover{transform:scale(1.1) rotate(12deg)}
.h-out{background:var(--surf2);border:1px solid var(--border);color:var(--text2);padding:7px 14px;font-family:'DM Mono',monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:9px;transition:all .2s}
.h-out:hover{border-color:var(--acc2);color:var(--acc2)}
.nav{display:flex;gap:3px;padding:10px 24px;background:var(--bg2);border-bottom:1px solid var(--border);overflow-x:auto;transition:background .3s}
.nav::-webkit-scrollbar{height:0}
.ntab{padding:8px 18px;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-radius:9px;transition:all .2s;user-select:none;white-space:nowrap;position:relative}
.ntab:hover{color:var(--text);background:var(--surf2)}
.ntab.on{color:var(--acc);background:var(--surf2)}
.ntab.on::after{content:"";position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);width:20px;height:2px;background:var(--acc);border-radius:2px}
.page{display:none;padding:24px;max-width:1440px;margin:0 auto}
.page.on{display:block}
.card{background:var(--surf);border:1px solid var(--border);border-radius:16px;padding:22px;transition:transform .2s,box-shadow .2s,background .3s}
.card:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3),0 0 0 1px var(--border2)}
[data-theme="light"] .card:hover{box-shadow:0 10px 30px rgba(91,82,238,.1),0 0 0 1px var(--border2)}
.chdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.ctit{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--acc)}
.cbadge{font-family:'DM Mono',monospace;font-size:10px;padding:3px 9px;border-radius:20px;background:var(--surf2);color:var(--text2);border:1px solid var(--border)}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:18px}
.big-time{font-family:'DM Mono',monospace;font-size:50px;font-weight:500;color:var(--acc);letter-spacing:-2px;line-height:1;margin-bottom:6px}
.clock-date{font-size:14px;color:var(--text2)}
.clock-year{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);margin-top:3px}
.stats2{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
.stat{background:var(--surf2);border:1px solid var(--border);border-radius:12px;padding:14px;transition:background .3s}
.stat-v{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;line-height:1;margin-bottom:3px}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--text3)}
.c-pk{color:var(--acc2)}.c-tl{color:var(--teal)}
.cg{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-top:10px}
.cdn{font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);text-align:center;padding:3px 0;letter-spacing:1px}
.cd{font-family:'DM Mono',monospace;font-size:11px;text-align:center;padding:5px 2px;color:var(--text2);border-radius:6px;transition:background .15s}
.cd.today{background:var(--acc);color:#fff;font-weight:700}
.info-row{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--surf2);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;transition:background .3s}
.info-ico{font-size:22px;flex-shrink:0}
.info-title{font-size:14px;font-weight:700;margin-bottom:1px}
.info-sub{font-family:'DM Mono',monospace;font-size:11px;color:var(--text2)}
.agrid{display:grid;grid-template-columns:1fr 1fr;gap:18px}
.acard{background:var(--surf);border:1px solid var(--border);border-radius:16px;overflow:hidden;transition:transform .2s,box-shadow .2s,background .3s}
.acard:hover{transform:translateY(-3px);box-shadow:0 16px 40px rgba(0,0,0,.3),0 0 0 1px var(--border2)}
[data-theme="light"] .acard:hover{box-shadow:0 10px 28px rgba(91,82,238,.1),0 0 0 1px var(--border2)}
.achdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surf2);flex-wrap:wrap;gap:8px;transition:background .3s}
.atit{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--acc);display:flex;align-items:center;gap:7px}
.atit-dot{width:7px;height:7px;border-radius:50%;background:var(--acc)}
.abtns{display:flex;gap:6px}
.abtn{background:var(--surf3);border:1px solid var(--border2);color:var(--text2);padding:5px 12px;font-family:'DM Mono',monospace;font-size:10px;cursor:pointer;border-radius:7px;transition:all .2s}
.abtn:hover{background:var(--acc);border-color:var(--acc);color:#fff}
.abtn.dl:hover{background:var(--teal);border-color:var(--teal);color:#fff}
.aframe{width:100%;border:none;display:block}
.lsec{margin-bottom:28px}
.lsec-hdr{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.lsec-t{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--text2)}
.lsec-hr{flex:1;height:1px;background:var(--border)}
.lgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(165px,1fr));gap:10px}
.ltile{display:flex;flex-direction:column;padding:16px;background:var(--surf);border:1px solid var(--border);border-radius:14px;text-decoration:none;color:var(--text);transition:transform .2s,box-shadow .2s,border-color .2s,background .3s}
.ltile:hover{transform:translateY(-4px);box-shadow:0 14px 32px rgba(0,0,0,.25);border-color:var(--border2)}
[data-theme="light"] .ltile:hover{box-shadow:0 8px 24px rgba(91,82,238,.1),0 0 0 1px var(--border2)}
.ltile-ico{font-size:26px;margin-bottom:8px}
.ltile-nm{font-size:14px;font-weight:700;margin-bottom:2px}
.ltile-url{font-family:'DM Mono',monospace;font-size:10px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty{font-family:'DM Mono',monospace;font-size:12px;color:var(--text3);padding:8px 0}
.expwrap{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;transition:background .3s}
.expwrap.on{display:flex}
.exphdr{display:flex;align-items:center;gap:12px;padding:13px 22px;background:var(--surf);border-bottom:1px solid var(--border);transition:background .3s}
.exptit{font-family:'DM Mono',monospace;font-size:11px;color:var(--acc);letter-spacing:2px;text-transform:uppercase;flex:1}
.expframe{flex:1;width:100%;border:none}

const APPS = {
  kalk:   { title:"Kalkulacka_casu.html",   src: "<!DOCTYPE html>\n<html lang=\"cs\" data-theme=\"light\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>Kalkulačka času</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500;600&display=swap\" rel=\"stylesheet\">\n<style>\n  /* ── LIGHT (default) ── */\n  :root, [data-theme=\"light\"] {\n    --bg: #f0f2f8;\n    --card: #ffffff;\n    --card2: #f5f6fb;\n    --accent: #6255d4;\n    --accent2: #e8457a;\n    --accent3: #0ab5cc;\n    --text: #1a1a2e;\n    --muted: #8888aa;\n    --border: rgba(98,85,212,0.18);\n    --success: #1aaa6e;\n    --success-bg: rgba(26,170,110,0.07);\n    --success-border: rgba(26,170,110,0.35);\n    --error-bg: rgba(210,40,40,0.06);\n    --error-border: rgba(210,40,40,0.55);\n    --error-text: #b82a2a;\n    --input-focus-bg: #fafbff;\n    --shadow: 0 0 60px rgba(98,85,212,0.08), 0 16px 48px rgba(0,0,0,0.08);\n    --blob-op: 0.07;\n    --toggle-bg: #e8e9f4;\n    --minutes-bg: rgba(98,85,212,0.08);\n    --minutes-border: rgba(98,85,212,0.28);\n    --minutes-text: #5246c0;\n  }\n\n  /* ── DARK ── */\n  [data-theme=\"dark\"] {\n    --bg: #0d0d14;\n    --card: #13131f;\n    --card2: #1a1a2e;\n    --accent: #7c6aff;\n    --accent2: #ff6a9f;\n    --accent3: #6af0ff;\n    --text: #e8e8f0;\n    --muted: #5a5a7a;\n    --border: rgba(124,106,255,0.2);\n    --success: #6af0b0;\n    --success-bg: rgba(106,240,176,0.05);\n    --success-border: rgba(106,240,176,0.3);\n    --error-bg: rgba(255,70,60,0.07);\n    --error-border: rgba(255,70,60,0.55);\n    --error-text: #ff6a64;\n    --input-focus-bg: #1e1e30;\n    --shadow: 0 0 60px rgba(124,106,255,0.08), 0 20px 60px rgba(0,0,0,0.4);\n    --blob-op: 0.12;\n    --toggle-bg: #1e1e30;\n    --minutes-bg: rgba(124,106,255,0.13);\n    --minutes-border: rgba(124,106,255,0.42);\n    --minutes-text: #b0a4ff;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: 'DM Sans', sans-serif;\n    background-color: var(--bg);\n    color: var(--text);\n    min-height: 100vh;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: flex-start;\n    overflow-x: hidden; overflow-y: auto;\n    position: relative;\n    padding: 40px 16px 40px;\n    transition: background-color 0.35s, color 0.35s;\n  }\n\n  .blob {\n    position: fixed; border-radius: 50%;\n    filter: blur(80px); opacity: var(--blob-op);\n    animation: drift 12s ease-in-out infinite alternate;\n    pointer-events: none; transition: opacity 0.35s;\n  }\n  .blob-1 { width:400px; height:400px; background:var(--accent); top:-100px; left:-100px; }\n  .blob-2 { width:300px; height:300px; background:var(--accent2); bottom:-80px; right:-80px; animation-delay:3s; }\n  .blob-3 { width:250px; height:250px; background:var(--accent3); top:50%; left:60%; animation-delay:6s; }\n  @keyframes drift {\n    from { transform: translate(0,0) scale(1); }\n    to   { transform: translate(40px,30px) scale(1.1); }\n  }\n\n  /* Top bar */\n  .topbar {\n    display: flex; align-items: center; gap: 14px;\n    margin-bottom: 22px;\n  }\n\n  .live-clock {\n    font-family: 'Space Mono', monospace;\n    font-size: 13px; color: var(--muted);\n    letter-spacing: 2px;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .live-clock .dot {\n    width:6px; height:6px; background:var(--success);\n    border-radius:50%; animation: pulse 1.5s ease-in-out infinite;\n  }\n  @keyframes pulse {\n    0%,100% { opacity:1; transform:scale(1); }\n    50%      { opacity:0.4; transform:scale(0.7); }\n  }\n\n  /* Theme toggle button */\n  .theme-toggle {\n    background: var(--toggle-bg);\n    border: 1.5px solid var(--border);\n    border-radius: 20px;\n    padding: 5px 11px;\n    cursor: pointer;\n    font-size: 15px; line-height: 1;\n    transition: background 0.3s, border-color 0.3s, transform 0.15s;\n    flex: unset;\n  }\n  .theme-toggle:hover  { transform: scale(1.12); }\n  .theme-toggle:active { transform: scale(0.94); }\n\n  h1 {\n    font-family: 'Space Mono', monospace;\n    font-size: 28px; font-weight: 700; letter-spacing: -1px;\n    margin-bottom: 8px;\n    background: linear-gradient(135deg, var(--accent), var(--accent2));\n    -webkit-background-clip: text; -webkit-text-fill-color: transparent;\n    background-clip: text;\n  }\n\n  .subtitle {\n    font-size: 13px; color: var(--muted);\n    margin-bottom: 28px; letter-spacing: 0.5px;\n  }\n\n  .card {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: 24px; padding: 28px; width: 340px; max-width: 100%;\n    display: flex; flex-direction: column; gap: 16px;\n    position: relative;\n    box-shadow: var(--shadow);\n    transition: background 0.35s, border-color 0.35s, box-shadow 0.35s;\n  }\n  .card::before {\n    content:''; position:absolute; inset:0; border-radius:24px; padding:1px;\n    background: linear-gradient(135deg, rgba(124,106,255,0.35), rgba(255,106,159,0.18), transparent);\n    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);\n    -webkit-mask-composite: xor; mask-composite: exclude; pointer-events: none;\n  }\n\n  /* Inputs */\n  .input-group { display:flex; flex-direction:column; gap:6px; }\n  .input-label {\n    font-size:11px; font-weight:600; letter-spacing:1.5px;\n    text-transform:uppercase; color:var(--muted);\n  }\n  .input-wrapper { position:relative; display:flex; align-items:center; }\n  .input-icon { position:absolute; left:14px; font-size:15px; pointer-events:none; opacity:0.65; }\n\n  input[type=\"text\"] {\n    font-family: 'Space Mono', monospace;\n    font-size: 22px; font-weight: 700;\n    padding: 14px 14px 14px 44px;\n    background: var(--card2);\n    border: 1.5px solid var(--border);\n    border-radius: 14px;\n    color: var(--text); outline: none; width: 100%;\n    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s, color 0.2s;\n    letter-spacing: 2px;\n  }\n  input[type=\"text\"]::placeholder {\n    color: var(--muted); font-size: 16px;\n    letter-spacing: 1px; font-weight: 400;\n  }\n  input[type=\"text\"]:focus {\n    border-color: var(--accent);\n    box-shadow: 0 0 0 3px rgba(124,106,255,0.13);\n    background: var(--input-focus-bg);\n  }\n  input[type=\"text\"].filled {\n    border-color: var(--success-border);\n    color: var(--success);\n  }\n  /* ★ Red border on invalid ★ */\n  input[type=\"text\"].invalid {\n    border-color: var(--error-border) !important;\n    box-shadow: 0 0 0 3px rgba(210,40,40,0.13) !important;\n    color: var(--error-text) !important;\n    animation: shake 0.32s ease;\n  }\n  @keyframes shake {\n    0%,100% { transform: translateX(0); }\n    20%     { transform: translateX(-5px); }\n    60%     { transform: translateX(5px); }\n  }\n\n  .divider {\n    display:flex; align-items:center; gap:10px;\n    color:var(--muted); font-size:12px; letter-spacing:1px;\n  }\n  .divider::before,.divider::after {\n    content:''; flex:1; height:1px; background:var(--border);\n  }\n\n  /* Buttons */\n  .buttons { display:flex; gap:10px; margin-top:4px; }\n  button {\n    flex:1; padding:13px;\n    font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600;\n    border:none; border-radius:12px; cursor:pointer;\n    transition: transform 0.15s, box-shadow 0.2s;\n    letter-spacing:0.3px;\n  }\n  button:active { transform:scale(0.97); }\n\n  .calc {\n    background: linear-gradient(135deg, var(--accent), #9b6aff);\n    color: white; box-shadow: 0 4px 20px rgba(124,106,255,0.3);\n    position:relative; overflow:hidden;\n  }\n  .calc::after {\n    content:''; position:absolute; inset:0;\n    background: linear-gradient(135deg,rgba(255,255,255,0.1),transparent);\n    pointer-events:none;\n  }\n  .calc:hover { box-shadow:0 6px 30px rgba(124,106,255,0.48); transform:translateY(-1px); }\n\n  .reset {\n    background:var(--card2); color:var(--muted);\n    border:1.5px solid var(--border);\n    transition: color 0.2s, border-color 0.2s, background 0.35s;\n  }\n  .reset:hover { color:var(--text); border-color:var(--accent2); }\n\n  /* Result */\n  .result-box {\n    background: var(--card2); border: 1.5px solid var(--border);\n    border-radius: 14px; padding: 16px; min-height: 100px;\n    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:4px;\n    transition: all 0.3s;\n  }\n  .result-box.has-result { border-color:var(--success-border); background:var(--success-bg); }\n  .result-box.has-error  { border-color:var(--error-border);   background:var(--error-bg); }\n\n  .result-empty { color:var(--muted); font-size:13px; text-align:center; }\n\n  .result-label {\n    font-size:11px; font-weight:600; letter-spacing:1.5px;\n    text-transform:uppercase; color:var(--muted); margin-bottom:4px;\n  }\n  .result-main {\n    font-family:'Space Mono',monospace;\n    font-size:30px; font-weight:700;\n    color:var(--success); letter-spacing:-1px;\n    animation: popIn 0.3s cubic-bezier(0.34,1.56,0.64,1);\n  }\n  @keyframes popIn {\n    from { opacity:0; transform:scale(0.85) translateY(6px); }\n    to   { opacity:1; transform:scale(1) translateY(0); }\n  }\n\n  /* ★ Minutes badge ★ */\n  .result-minutes {\n    display: inline-flex; align-items: center; gap: 7px;\n    margin-top: 8px;\n    background: var(--minutes-bg);\n    border: 1.5px solid var(--minutes-border);\n    border-radius: 30px; padding: 6px 16px;\n    animation: popIn 0.35s 0.06s cubic-bezier(0.34,1.56,0.64,1) both;\n  }\n  .min-num {\n    font-family:'Space Mono',monospace;\n    font-size:20px; font-weight:700;\n    color:var(--minutes-text); letter-spacing:-0.5px;\n  }\n  .min-label {\n    font-size:11px; font-weight:600;\n    letter-spacing:1px; text-transform:uppercase; color:var(--muted);\n  }\n\n  .result-hours {\n    font-size:11px; color:var(--muted);\n    font-family:'Space Mono',monospace; margin-top:3px;\n  }\n\n  .result-error { font-size:13px; color:var(--error-text); text-align:center; }\n\n  /* History */\n  .history-header {\n    display:flex; align-items:center;\n    justify-content:space-between; margin-top:4px;\n  }\n  .history-title {\n    font-size:11px; font-weight:600;\n    letter-spacing:1.5px; text-transform:uppercase; color:var(--muted);\n  }\n  .history-clear {\n    font-size:11px; color:var(--muted);\n    cursor:pointer; background:none; border:none;\n    padding:0; flex:unset; letter-spacing:0.5px; transition:color 0.2s;\n  }\n  .history-clear:hover { color:var(--accent2); }\n\n  .history-list {\n    display:flex; flex-direction:column; gap:6px;\n    overflow-y: visible;\n    scrollbar-width:thin; scrollbar-color:var(--border) transparent;\n  }\n  .history-item {\n    display:flex; align-items:center; justify-content:space-between;\n    background:var(--card2); border:1px solid var(--border);\n    border-radius:10px; padding:8px 12px; font-size:12px;\n    animation:fadeIn 0.2s ease-out; cursor:pointer;\n    transition:border-color 0.2s, background 0.35s;\n  }\n  .history-item:hover { border-color:rgba(124,106,255,0.45); }\n  .history-times { font-family:'Space Mono',monospace; color:var(--muted); font-size:11px; }\n  .history-dur   { font-family:'Space Mono',monospace; color:var(--success); font-size:12px; font-weight:700; }\n  @keyframes fadeIn {\n    from { opacity:0; transform:translateX(-8px); }\n    to   { opacity:1; transform:translateX(0); }\n  }\n\n  .footer { margin-top:20px; font-size:11px; color:var(--muted); letter-spacing:0.5px; }\n</style>\n</head>\n<body>\n\n<div class=\"blob blob-1\"></div>\n<div class=\"blob blob-2\"></div>\n<div class=\"blob blob-3\"></div>\n\n<div class=\"topbar\">\n  <div class=\"live-clock\">\n    <span class=\"dot\"></span>\n    <span id=\"liveClock\">--:--:--</span>\n  </div>\n  <button class=\"theme-toggle\" id=\"themeBtn\" onclick=\"toggleTheme()\" title=\"Přepnout téma\">🌙</button>\n</div>\n\n<h1>⏱ ČASOMÍRA</h1>\n<p class=\"subtitle\">Kalkulačka doby trvání</p>\n\n<div class=\"card\">\n\n  <div class=\"input-group\">\n    <span class=\"input-label\">Začátek</span>\n    <div class=\"input-wrapper\">\n      <span class=\"input-icon\">🟢</span>\n      <input type=\"text\" id=\"start\" placeholder=\"08:00\" inputmode=\"numeric\" maxlength=\"5\" autocomplete=\"off\">\n    </div>\n  </div>\n\n  <div class=\"divider\">↓</div>\n\n  <div class=\"input-group\">\n    <span class=\"input-label\">Konec</span>\n    <div class=\"input-wrapper\">\n      <span class=\"input-icon\">🔴</span>\n      <input type=\"text\" id=\"end\" placeholder=\"16:30\" inputmode=\"numeric\" maxlength=\"5\" autocomplete=\"off\">\n    </div>\n  </div>\n\n  <div class=\"buttons\">\n    <button class=\"calc\" onclick=\"calculate()\">Spočítat →</button>\n    <button class=\"reset\" onclick=\"resetFields()\">↺ Reset</button>\n  </div>\n\n  <div class=\"result-box\" id=\"resultBox\">\n    <span class=\"result-empty\">Zadej časy a stiskni Spočítat</span>\n  </div>\n\n  <div class=\"history-header\" id=\"historyHeader\" style=\"display:none\">\n    <span class=\"history-title\">Historie</span>\n    <button class=\"history-clear\" onclick=\"clearHistory()\">Vymazat</button>\n  </div>\n  <div class=\"history-list\" id=\"historyList\"></div>\n\n</div>\n\n\n<script>\n  // ── Theme ──\n  let isDark = false;\n  function toggleTheme() {\n    isDark = !isDark;\n    document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');\n    document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';\n  }\n\n  // ── Clock ──\n  function updateClock() {\n    document.getElementById('liveClock').textContent = new Date().toTimeString().slice(0, 8);\n  }\n  updateClock();\n  setInterval(updateClock, 1000);\n\n  // ── Auto-format ──\n  function autoFormatTime(inp) {\n    let v = inp.value.replace(/\\D/g, '');\n    if (v.length >= 3) v = v.slice(0,2) + ':' + v.slice(2,4);\n    inp.value = v;\n\n    if (v.length === 5) {\n      const h = Number(v.slice(0,2)), m = Number(v.slice(3,5));\n      const valid = h >= 0 && h <= 23 && m >= 0 && m <= 59;\n      if (valid) {\n        inp.classList.remove('invalid');\n        inp.classList.add('filled');\n        if (inp.id === 'start') {\n          const endEl = document.getElementById('end');\n          endEl.focus();\n          endEl.select();\n        }\n      } else {\n        inp.classList.remove('filled');\n        inp.classList.add('invalid');\n      }\n    } else {\n      inp.classList.remove('filled', 'invalid');\n    }\n  }\n\n  document.querySelectorAll('input').forEach(inp => {\n    inp.addEventListener('input', () => autoFormatTime(inp));\n    inp.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });\n  });\n\n  // ── Parse ──\n  function parseTime(str, el) {\n    const parts = str.split(':');\n    if (parts.length !== 2) { markInvalid(el); throw 'invalid'; }\n    const h = Number(parts[0]), m = Number(parts[1]);\n    if (isNaN(h) || isNaN(m) || h < 0 || h > 23 || m < 0 || m > 59) {\n      markInvalid(el); throw 'invalid';\n    }\n    return h * 60 + m;\n  }\n\n  function markInvalid(el) {\n    el.classList.remove('filled');\n    el.classList.add('invalid');\n    setTimeout(() => el.classList.remove('invalid'), 1600);\n  }\n\n  let history = [];\n\n  function calculate() {\n    const box = document.getElementById('resultBox');\n    const startEl = document.getElementById('start');\n    const endEl   = document.getElementById('end');\n    let err = false, start, end;\n    try { start = parseTime(startEl.value, startEl); } catch { err = true; }\n    try { end   = parseTime(endEl.value,   endEl);   } catch { err = true; }\n\n    if (err) {\n      box.className = 'result-box has-error';\n      box.innerHTML = `<div class=\"result-error\">⚠ Zadej platný čas ve formátu HH:MM<br><small style=\"opacity:.7\">(00:00 – 23:59)</small></div>`;\n      return;\n    }\n\n    let diff = end - start;\n    const overnight = diff < 0;\n    if (overnight) diff += 1440;\n    const h = Math.floor(diff / 60), m = diff % 60;\n\n    box.className = 'result-box has-result';\n    box.innerHTML = `\n      <div class=\"result-label\">Doba trvání${overnight ? ' · 🌙 přes půlnoc' : ''}</div>\n      <div class=\"result-main\">${String(h).padStart(2,'0')}h ${String(m).padStart(2,'0')}m</div>\n      <div class=\"result-minutes\">\n        <span class=\"min-num\">${diff}</span>\n        <span class=\"min-label\">minut celkem</span>\n      </div>\n      <div class=\"result-hours\">${(diff/60).toFixed(2)} hodin</div>\n    `;\n\n    history.unshift({ start: startEl.value, end: endEl.value, h, m, total: diff, overnight });\n    if (history.length > 4) history.pop();\n    renderHistory();\n  }\n\n  function renderHistory() {\n    const list = document.getElementById('historyList');\n    const hdr  = document.getElementById('historyHeader');\n    if (!history.length) { list.innerHTML = ''; hdr.style.display = 'none'; return; }\n    hdr.style.display = 'flex';\n    list.innerHTML = history.map((it, i) => `\n      <div class=\"history-item\" onclick=\"loadHistory(${i})\">\n        <span class=\"history-times\">${it.start} → ${it.end}${it.overnight ? ' 🌙' : ''}</span>\n        <span class=\"history-dur\">${it.h}h ${String(it.m).padStart(2,'0')}m · ${it.total} min</span>\n      </div>\n    `).join('');\n  }\n\n  function loadHistory(i) {\n    const it = history[i];\n    document.getElementById('start').value = it.start;\n    document.getElementById('end').value   = it.end;\n    document.querySelectorAll('input').forEach(inp => { inp.classList.remove('invalid'); inp.classList.add('filled'); });\n    calculate();\n  }\n\n  function clearHistory() { history = []; renderHistory(); }\n\n  function resetFields() {\n    document.getElementById('start').value = '';\n    document.getElementById('end').value   = '';\n    document.querySelectorAll('input').forEach(inp => inp.classList.remove('filled','invalid'));\n    const box = document.getElementById('resultBox');\n    box.className = 'result-box';\n    box.innerHTML = `<span class=\"result-empty\">Zadej časy a stiskni Spočítat</span>`;\n    document.getElementById('start').focus();\n  }\n<\/script>\n</body>\n</html>\n" },
  oopbuy: { title:"OopBuy_Rozdeleni.html", src: "<!DOCTYPE html>\n<html lang=\"cs\">\n<head>\n<meta charset=\"UTF-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n<title>OopBuy — Rozdělení nákladů</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:ital,wght@0,700;1,500&display=swap\" rel=\"stylesheet\">\n<style>\n* { box-sizing: border-box; margin: 0; padding: 0; }\n\n:root {\n  --bg:          #f7f6f3;\n  --surface:     #ffffff;\n  --surface2:    #f2f0ec;\n  --surface3:    #e8e5df;\n  --border:      #e0ddd7;\n  --border2:     #c8c4bc;\n  --accent:      #1a6b45;\n  --accent2:     #25a06a;\n  --accent-bg:   #edf7f2;\n  --accent-bdr:  #b3dfc8;\n  --text:        #18181b;\n  --text2:       #52524e;\n  --text3:       #a09d97;\n  --danger:      #d94f3d;\n  --danger-bg:   #fdf1f0;\n  --r:           12px;\n  --rs:          8px;\n  --tr:          background .22s, color .22s, border-color .22s;\n}\n\nbody.dark {\n  --bg:          #111110;\n  --surface:     #1c1c1a;\n  --surface2:    #242422;\n  --surface3:    #2e2e2b;\n  --border:      #333330;\n  --border2:     #444440;\n  --accent:      #34c47a;\n  --accent2:     #34c47a;\n  --accent-bg:   rgba(52,196,122,.1);\n  --accent-bdr:  rgba(52,196,122,.25);\n  --text:        #f0ede6;\n  --text2:       #999890;\n  --text3:       #555550;\n  --danger:      #f07060;\n  --danger-bg:   rgba(240,112,96,.08);\n}\n\nbody {\n  background: var(--bg);\n  color: var(--text);\n  font-family: 'Inter', sans-serif;\n  font-size: 14px;\n  line-height: 1.5;\n  min-height: 100vh;\n  padding: 40px 16px 100px;\n  transition: var(--tr);\n}\n\n.page { max-width: 680px; margin: 0 auto; }\n\n/* ── Top bar ─────────────────────────────── */\n.topbar {\n  display: flex; align-items: center; justify-content: space-between;\n  margin-bottom: 36px;\n  animation: up .45s ease both;\n}\n\n.brand { display: flex; flex-direction: column; gap: 2px; }\n\n.brand-tag {\n  font-size: 10px; font-weight: 600; letter-spacing: .14em;\n  text-transform: uppercase; color: var(--accent2);\n}\n\n.brand-title {\n  font-family: 'Playfair Display', serif;\n  font-size: 26px; font-weight: 700; color: var(--text); line-height: 1;\n}\n\n.brand-title em { font-style: italic; font-weight: 500; color: var(--accent); }\n\n.theme-btn {\n  width: 36px; height: 36px; border-radius: 50%;\n  background: var(--surface); border: 1.5px solid var(--border);\n  display: flex; align-items: center; justify-content: center;\n  font-size: 15px; cursor: pointer; flex-shrink: 0;\n  transition: var(--tr), transform .15s;\n  box-shadow: 0 1px 4px rgba(0,0,0,.06);\n}\n.theme-btn:hover { transform: scale(1.08); border-color: var(--border2); }\n\n/* ── Cards (input panels) ────────────────── */\n.panel {\n  background: var(--surface);\n  border: 1.5px solid var(--border);\n  border-radius: var(--r);\n  margin-bottom: 12px;\n  transition: var(--tr);\n  animation: up .45s ease both;\n}\n\n.panel-header {\n  display: flex; align-items: center; justify-content: space-between;\n  padding: 14px 18px;\n  border-bottom: 1.5px solid var(--border);\n}\n\n.panel-title {\n  font-size: 11px; font-weight: 600; letter-spacing: .12em;\n  text-transform: uppercase; color: var(--text3);\n}\n\n.panel-body { padding: 18px; }\n\n/* ── Two-col grid ────────────────────────── */\n.grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }\n@media (max-width: 440px) { .grid2 { grid-template-columns: 1fr; } }\n\n/* ── Field ───────────────────────────────── */\n.field { display: flex; flex-direction: column; gap: 5px; }\n\n.field label {\n  font-size: 11px; font-weight: 500; color: var(--text2); letter-spacing: .03em;\n}\n\n.field input {\n  background: var(--surface2);\n  border: 1.5px solid var(--border);\n  border-radius: var(--rs);\n  color: var(--text);\n  font-family: 'Inter', sans-serif; font-size: 14px;\n  padding: 9px 12px;\n  outline: none; width: 100%;\n  transition: var(--tr), box-shadow .15s;\n}\n.field input:focus { border-color: var(--accent2); box-shadow: 0 0 0 3px var(--accent-bg); }\n.field input::placeholder { color: var(--text3); }\n\n.pw { position: relative; }\n.pw input { padding-left: 24px; }\n.pw-sym {\n  position: absolute; left: 10px; top: 50%;\n  transform: translateY(-50%);\n  font-size: 12px; color: var(--text3); pointer-events: none;\n}\n\n/* ── Person card ─────────────────────────── */\n.person-card {\n  background: var(--surface);\n  border: 1.5px solid var(--border);\n  border-radius: var(--r);\n  margin-bottom: 10px;\n  transition: var(--tr), box-shadow .15s;\n}\n.person-card:hover { box-shadow: 0 2px 14px rgba(0,0,0,.06); }\n.person-card:last-child { margin-bottom: 0; }\n\n.pc-head {\n  display: flex; align-items: center; gap: 10px;\n  padding: 12px 16px;\n  border-bottom: 1.5px solid var(--border);\n  background: var(--surface2);\n  border-radius: var(--r) var(--r) 0 0;\n}\n\n.avatar {\n  width: 34px; height: 34px; border-radius: 50%; flex-shrink: 0;\n  background: var(--accent-bg); border: 1.5px solid var(--accent-bdr);\n  display: flex; align-items: center; justify-content: center;\n  font-family: 'Playfair Display', serif; font-size: 13px;\n  font-weight: 700; color: var(--accent);\n}\n\n.name-wrap { flex: 1; min-width: 0; }\n\n.name-input {\n  background: transparent; border: none; border-bottom: 1.5px solid transparent;\n  color: var(--text); font-family: 'Inter', sans-serif;\n  font-size: 14px; font-weight: 500;\n  padding: 2px 0; outline: none; width: 100%;\n  transition: border-color .15s;\n}\n.name-input:focus { border-color: var(--accent2); }\n.name-input::placeholder { color: var(--text3); font-weight: 400; }\n\n.badge {\n  font-size: 10px; font-weight: 600; letter-spacing: .08em;\n  text-transform: uppercase; color: var(--accent);\n  background: var(--accent-bg); border: 1px solid var(--accent-bdr);\n  padding: 3px 8px; border-radius: 20px; flex-shrink: 0;\n}\n\n.pc-actions { display: flex; gap: 6px; flex-shrink: 0; }\n\n.btn-icon {\n  background: none; border: 1.5px solid var(--border);\n  border-radius: var(--rs); color: var(--text3);\n  cursor: pointer; font-size: 11px; font-weight: 500;\n  font-family: 'Inter', sans-serif;\n  padding: 3px 9px; transition: all .15s; white-space: nowrap;\n}\n.btn-icon:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-bg); }\n.btn-icon.danger:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }\n\n.pc-body { padding: 14px 16px; }\n\n/* ── Add person ──────────────────────────── */\n.add-btn {\n  display: flex; align-items: center; justify-content: center; gap: 8px;\n  width: 100%; padding: 11px;\n  background: transparent; border: 1.5px dashed var(--border2);\n  border-radius: var(--r); color: var(--text3);\n  font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500;\n  cursor: pointer; transition: all .18s; margin-top: 10px;\n}\n.add-btn:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-bg); }\n\n/* ── Action buttons ──────────────────────── */\n.actions { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }\n\n.calc-btn {\n  width: 100%; padding: 14px;\n  background: var(--accent); color: #fff; border: none;\n  border-radius: var(--r); font-family: 'Inter', sans-serif;\n  font-size: 13px; font-weight: 600; letter-spacing: .06em;\n  cursor: pointer; transition: all .18s; text-transform: uppercase;\n}\n.calc-btn:hover { filter: brightness(1.1); transform: translateY(-1px); box-shadow: 0 4px 18px rgba(26,107,69,.28); }\n.calc-btn:active { transform: none; box-shadow: none; }\n\n.reset-btn {\n  width: 100%; padding: 11px;\n  background: transparent; border: 1.5px solid var(--border);\n  border-radius: var(--r); font-family: 'Inter', sans-serif;\n  font-size: 12px; font-weight: 500; color: var(--text3);\n  cursor: pointer; transition: all .18s; letter-spacing: .05em;\n  text-transform: uppercase;\n}\n.reset-btn:hover { border-color: var(--danger); color: var(--danger); background: var(--danger-bg); }\n\n/* ── Error ───────────────────────────────── */\n.error {\n  background: var(--danger-bg); border: 1.5px solid rgba(217,79,61,.25);\n  color: var(--danger); border-radius: var(--rs);\n  padding: 9px 13px; font-size: 12px; font-weight: 500;\n  margin-top: 8px; display: none;\n}\n.error.show { display: block; }\n\n/* ── Divider ─────────────────────────────── */\n.divider { border: none; border-top: 1.5px solid var(--border); margin: 28px 0; display: none; }\n\n/* ── Results ─────────────────────────────── */\n#results { display: none; }\n#results.show { display: block; animation: up .35s ease both; }\n\n.res-label {\n  font-size: 10px; font-weight: 600; letter-spacing: .14em;\n  text-transform: uppercase; color: var(--text3);\n  display: flex; align-items: center; gap: 10px; margin-bottom: 14px;\n}\n.res-label::after { content: ''; flex: 1; height: 1.5px; background: var(--border); }\n\n/* Summary strip */\n.summary {\n  display: grid; grid-template-columns: repeat(3, 1fr);\n  gap: 10px; margin-bottom: 16px;\n}\n@media (max-width: 440px) { .summary { grid-template-columns: 1fr 1fr; } }\n\n.sum-card {\n  background: var(--surface); border: 1.5px solid var(--border);\n  border-radius: var(--r); padding: 14px 16px;\n  transition: var(--tr);\n}\n.sum-card.hi { border-color: var(--accent-bdr); background: var(--accent-bg); }\n.sum-lbl { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--text3); margin-bottom: 4px; }\n.sum-card.hi .sum-lbl { color: var(--accent); }\n.sum-val { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--text); }\n.sum-card.hi .sum-val { color: var(--accent); }\n\n/* Result person cards */\n.rc {\n  background: var(--surface); border: 1.5px solid var(--border);\n  border-radius: var(--r); margin-bottom: 10px; overflow: hidden;\n  transition: var(--tr);\n}\n.rc:last-child { margin-bottom: 0; }\n\n.rc-head {\n  display: flex; align-items: center; gap: 12px;\n  padding: 14px 18px;\n  background: var(--surface2); border-bottom: 1.5px solid var(--border);\n}\n\n.rc-av {\n  width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0;\n  background: var(--accent-bg); border: 1.5px solid var(--accent-bdr);\n  display: flex; align-items: center; justify-content: center;\n  font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700; color: var(--accent);\n}\n\n.rc-name { font-size: 15px; font-weight: 600; color: var(--text); flex: 1; }\n.rc-usd { font-family: 'Playfair Display', serif; font-size: 18px; color: var(--accent); }\n\n.rc-body { padding: 14px 18px; }\n\n.rc-rows { margin-bottom: 12px; }\n\n.rc-row {\n  display: flex; align-items: baseline; justify-content: space-between;\n  padding: 6px 0; border-bottom: 1px solid var(--border);\n}\n.rc-row:last-child { border-bottom: none; }\n\n.rc-lbl { font-size: 12px; color: var(--text2); }\n\n.rc-vals { text-align: right; }\n.rc-usd-s { font-size: 13px; font-weight: 500; color: var(--text); }\n.rc-czk-s { font-size: 11px; color: var(--text3); margin-top: 1px; }\n\n.rc-total {\n  display: flex; align-items: center; justify-content: space-between;\n  background: var(--accent-bg); border: 1.5px solid var(--accent-bdr);\n  border-radius: var(--rs); padding: 12px 16px;\n}\n.rc-total-lbl { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em; color: var(--accent); }\n.rc-total-vals { text-align: right; }\n.rc-total-czk { font-family: 'Playfair Display', serif; font-size: 20px; color: var(--accent); }\n.rc-total-usd { font-size: 11px; color: var(--accent2); margin-top: 1px; opacity: .8; }\n\n@keyframes up {\n  from { opacity: 0; transform: translateY(10px); }\n  to   { opacity: 1; transform: translateY(0); }\n}\n</style>\n</head>\n<body>\n<div class=\"page\">\n\n  <!-- Top bar -->\n  <div class=\"topbar\">\n    <div class=\"brand\">\n      <span class=\"brand-tag\">OopBuy</span>\n      <span class=\"brand-title\">Rozdělení <em>nákladů</em></span>\n    </div>\n    <button class=\"theme-btn\" id=\"theme-btn\" onclick=\"toggleTheme()\">🌙</button>\n  </div>\n\n  <!-- Kurz & poplatek -->\n  <div class=\"panel\" style=\"animation-delay:.04s\">\n    <div class=\"panel-header\">\n      <span class=\"panel-title\">Kurz & poplatek za kartu</span>\n    </div>\n    <div class=\"panel-body\">\n      <div class=\"grid2\">\n        <div class=\"field\">\n          <label>Kurz USD / CZK</label>\n          <input type=\"number\" id=\"rate\" value=\"23.5\" min=\"1\" step=\"0.01\" placeholder=\"23.50\">\n        </div>\n        <div class=\"field\">\n          <label>Poplatek za kartu ($)</label>\n          <div class=\"pw\">\n            <span class=\"pw-sym\">$</span>\n            <input type=\"number\" id=\"fee-card\" min=\"0\" step=\"0.01\" placeholder=\"0.00\">\n          </div>\n        </div>\n      </div>\n    </div>\n  </div>\n\n  <!-- Osoby -->\n  <div class=\"panel\" style=\"animation-delay:.08s\">\n    <div class=\"panel-header\">\n      <span class=\"panel-title\">Osoby</span>\n    </div>\n    <div class=\"panel-body\">\n      <div id=\"persons-list\"></div>\n      <button class=\"add-btn\" onclick=\"addPerson()\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 14 14\" fill=\"none\"><circle cx=\"7\" cy=\"7\" r=\"6\" stroke=\"currentColor\" stroke-width=\"1.5\"/><path d=\"M7 4v6M4 7h6\" stroke=\"currentColor\" stroke-width=\"1.5\" stroke-linecap=\"round\"/></svg>\n        Přidat osobu\n      </button>\n      <div class=\"error\" id=\"error-msg\">Alespoň jedna osoba musí mít vyplněné jméno.</div>\n    </div>\n  </div>\n\n  <!-- Tlačítka -->\n  <div class=\"actions\">\n    <button class=\"calc-btn\" onclick=\"calculate()\">Spočítat →</button>\n    <button class=\"reset-btn\" onclick=\"resetAll()\">↺ Vymazat vše</button>\n  </div>\n\n  <hr class=\"divider\" id=\"divider\">\n\n  <!-- Výsledky -->\n  <div id=\"results\">\n    <div class=\"res-label\">Výsledky</div>\n    <div class=\"summary\" id=\"summary\"></div>\n    <div id=\"result-cards\"></div>\n  </div>\n\n</div>\n<script>\nlet personCount = 0;\nlet dark = false;\n\n/* ── localStorage ─────────────────────────── */\nfunction save() {\n  const persons = [];\n  document.querySelectorAll('.person-card').forEach(c => {\n    const id = c.id.replace('pc-','');\n    persons.push({\n      id,\n      name:  document.getElementById('name-' +id)?.value||'',\n      goods: document.getElementById('goods-'+id)?.value||'',\n      ship:  document.getElementById('ship-' +id)?.value||'',\n      first: !!c.querySelector('.badge')\n    });\n  });\n  localStorage.setItem('oopbuy', JSON.stringify({\n    rate:    document.getElementById('rate').value,\n    feeCard: document.getElementById('fee-card').value,\n    dark, persons, nextId: personCount\n  }));\n}\n\nfunction load() {\n  try {\n    const raw = localStorage.getItem('oopbuy');\n    if (!raw) return false;\n    const d = JSON.parse(raw);\n    document.getElementById('rate').value     = d.rate    || '23.5';\n    document.getElementById('fee-card').value = d.feeCard || '';\n    if (d.dark) { dark=true; document.body.classList.add('dark'); document.getElementById('theme-btn').textContent='☀️'; }\n    if (d.persons?.length) {\n      personCount = d.nextId || 0;\n      d.persons.forEach(p => {\n        renderCard(p.id, p.first);\n        document.getElementById('name-' +p.id).value = p.name;\n        document.getElementById('goods-'+p.id).value = p.goods;\n        document.getElementById('ship-' +p.id).value = p.ship;\n        updateAvatar(p.id, p.name);\n      });\n      return true;\n    }\n  } catch(e){}\n  return false;\n}\n\n/* ── Render person card ───────────────────── */\nfunction renderCard(id, isFirst) {\n  const list = document.getElementById('persons-list');\n  const c = document.createElement('div');\n  c.className = 'person-card';\n  c.id = 'pc-' + id;\n  c.innerHTML = `\n    <div class=\"pc-head\">\n      <div class=\"avatar\" id=\"av-${id}\">?</div>\n      <div class=\"name-wrap\">\n        <input class=\"name-input\" type=\"text\" placeholder=\"Jméno…\" id=\"name-${id}\"\n          oninput=\"updateAvatar(${id},this.value);save()\">\n      </div>\n      ${isFirst ? '<span class=\"badge\">Objednavatel</span>' : ''}\n      <div class=\"pc-actions\">\n        <button class=\"btn-icon\" onclick=\"resetPerson(${id})\">↺ reset</button>\n        ${isFirst ? '' : `<button class=\"btn-icon danger\" onclick=\"removePerson(${id})\">× odebrat</button>`}\n      </div>\n    </div>\n    <div class=\"pc-body\">\n      <div class=\"grid2\">\n        <div class=\"field\">\n          <label>Cena zboží ($)</label>\n          <div class=\"pw\"><span class=\"pw-sym\">$</span>\n            <input type=\"number\" id=\"goods-${id}\" min=\"0\" step=\"0.01\" placeholder=\"0.00\" oninput=\"save()\">\n          </div>\n        </div>\n        <div class=\"field\">\n          <label>Doprava domů ($)</label>\n          <div class=\"pw\"><span class=\"pw-sym\">$</span>\n            <input type=\"number\" id=\"ship-${id}\" min=\"0\" step=\"0.01\" placeholder=\"0.00\" oninput=\"save()\">\n          </div>\n        </div>\n      </div>\n    </div>`;\n  list.appendChild(c);\n}\n\nfunction addPerson() {\n  const id = personCount++;\n  const isFirst = document.getElementById('persons-list').children.length === 0;\n  renderCard(id, isFirst);\n  save();\n}\n\nfunction removePerson(id) {\n  document.getElementById('pc-'+id)?.remove();\n  save();\n}\n\nfunction updateAvatar(id, val) {\n  const av = document.getElementById('av-'+id);\n  if (av) av.textContent = initials(val) || '?';\n}\n\n/* ── Theme ────────────────────────────────── */\nfunction toggleTheme() {\n  dark = !dark;\n  document.body.classList.toggle('dark', dark);\n  document.getElementById('theme-btn').textContent = dark ? '☀️' : '🌙';\n  save();\n}\n\n/* ── Helpers ──────────────────────────────── */\nfunction initials(n) { return n.trim().split(/\\s+/).map(w=>w[0]||'').join('').toUpperCase().slice(0,2); }\nfunction usd(n) { return '$'+n.toFixed(2); }\nfunction czk(n, r) { return Math.round(n*r).toLocaleString('cs-CZ')+' Kč'; }\n\n/* ── Reset ────────────────────────────────── */\nfunction resetPerson(id) {\n  ['name-','goods-','ship-'].forEach(p => {\n    const el = document.getElementById(p+id);\n    if (el) el.value = '';\n  });\n  updateAvatar(id, '');\n  save();\n}\n\nfunction resetAll() {\n  if (!confirm('Opravdu vymazat vše?')) return;\n  localStorage.removeItem('oopbuy');\n  document.getElementById('rate').value = '23.5';\n  document.getElementById('fee-card').value = '';\n  document.getElementById('persons-list').innerHTML = '';\n  document.getElementById('results').classList.remove('show');\n  document.getElementById('divider').style.display = 'none';\n  document.getElementById('error-msg').classList.remove('show');\n  personCount = 0;\n  addPerson(); addPerson(); addPerson();\n}\n\n/* ── Calculate ────────────────────────────── */\nfunction calculate() {\n  const err = document.getElementById('error-msg');\n  err.classList.remove('show');\n\n  const rate    = parseFloat(document.getElementById('rate').value)     || 23.5;\n  const feeCard = parseFloat(document.getElementById('fee-card').value) || 0;\n\n  let persons = [];\n  document.querySelectorAll('.person-card').forEach(c => {\n    const id      = c.id.replace('pc-','');\n    const name    = document.getElementById('name-' +id)?.value.trim()||'';\n    const goods   = parseFloat(document.getElementById('goods-'+id)?.value)||0;\n    const ship    = parseFloat(document.getElementById('ship-' +id)?.value)||0;\n    if (!name) return;\n    persons.push({name, goods, ship});\n  });\n\n  if (!persons.length) { err.classList.add('show'); return; }\n\n  const cardEach = feeCard / persons.length;\n  persons.forEach(p => {\n    p.card  = cardEach;\n    p.total = p.goods + p.ship + p.card;\n  });\n\n  const grand = persons.reduce((s,p)=>s+p.total,0);\n\n  /* summary */\n  document.getElementById('summary').innerHTML = `\n    <div class=\"sum-card hi\">\n      <div class=\"sum-lbl\">Celkem USD</div>\n      <div class=\"sum-val\">${usd(grand)}</div>\n    </div>\n    <div class=\"sum-card\">\n      <div class=\"sum-lbl\">Celkem CZK</div>\n      <div class=\"sum-val\">${czk(grand,rate)}</div>\n    </div>\n    <div class=\"sum-card\">\n      <div class=\"sum-lbl\">Počet osob</div>\n      <div class=\"sum-val\">${persons.length}</div>\n    </div>`;\n\n  /* person result cards */\n  const el = document.getElementById('result-cards');\n  el.innerHTML = '';\n  persons.forEach(p => {\n    const rows = [\n      {l:'Zboží', v: p.goods},\n      ...(p.ship  > 0 ? [{l:'Doprava domů',     v: p.ship}]  : []),\n      ...(feeCard > 0 ? [{l:'Poplatek za kartu', v: p.card}]  : []),\n    ].map(r=>`\n      <div class=\"rc-row\">\n        <span class=\"rc-lbl\">${r.l}</span>\n        <div class=\"rc-vals\">\n          <div class=\"rc-usd-s\">${usd(r.v)}</div>\n          <div class=\"rc-czk-s\">${czk(r.v,rate)}</div>\n        </div>\n      </div>`).join('');\n\n    const d = document.createElement('div');\n    d.className = 'rc';\n    d.innerHTML = `\n      <div class=\"rc-head\">\n        <div class=\"rc-av\">${initials(p.name)||'?'}</div>\n        <div class=\"rc-name\">${p.name}</div>\n        <div class=\"rc-usd\">${usd(p.total)}</div>\n      </div>\n      <div class=\"rc-body\">\n        <div class=\"rc-rows\">${rows}</div>\n        <div class=\"rc-total\">\n          <span class=\"rc-total-lbl\">Pošle celkem</span>\n          <div class=\"rc-total-vals\">\n            <div class=\"rc-total-czk\">${czk(p.total,rate)}</div>\n            <div class=\"rc-total-usd\">${usd(p.total)}</div>\n          </div>\n        </div>\n      </div>`;\n    el.appendChild(d);\n  });\n\n  document.getElementById('divider').style.display = 'block';\n  document.getElementById('results').classList.add('show');\n  setTimeout(()=>document.getElementById('results').scrollIntoView({behavior:'smooth',block:'start'}),80);\n}\n\n/* ── Init ─────────────────────────────────── */\nconst loaded = load();\nif (!loaded) { addPerson(); addPerson(); addPerson(); }\ndocument.getElementById('rate').addEventListener('input', save);\ndocument.getElementById('fee-card').addEventListener('input', save);\n<\/script>\n</body>\n</html>\n" },
  terasa: { title:"Terasa_Manager.html", src: "<!DOCTYPE html>\n<html lang=\"cs\">\n<head>\n<meta charset=\"UTF-8\" />\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no\" />\n<title>Terasa — Správce Útrat</title>\n<link href=\"https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap\" rel=\"stylesheet\">\n<style>\n  :root {\n    --bg:        #0d0f14;\n    --surface:   #161922;\n    --card:      #1e2330;\n    --border:    #2a3045;\n    --accent:    #f0a500;\n    --accent2:   #e05a2b;\n    --green:     #2ecc71;\n    --red:       #e74c3c;\n    --text:      #e8ecf4;\n    --muted:     #7a849e;\n    --highlight: rgba(240,165,0,0.10);\n    --radius:    14px;\n    --font:      'Syne', sans-serif;\n    --mono:      'DM Mono', monospace;\n  }\n\n  * { box-sizing: border-box; margin: 0; padding: 0; }\n\n  body {\n    font-family: var(--font);\n    background: var(--bg);\n    color: var(--text);\n    min-height: 100vh;\n  }\n\n  /* ── HEADER ── */\n  .app-header {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 14px 24px 12px;\n    background: var(--surface);\n    border-bottom: 1px solid var(--border);\n    position: sticky;\n    top: 0;\n    z-index: 100;\n  }\n  .logo {\n    font-size: 1.3em;\n    font-weight: 800;\n    letter-spacing: 2px;\n    text-transform: uppercase;\n    color: var(--accent);\n  }\n  .logo span { color: var(--text); font-weight: 400; }\n  .header-right {\n    display: flex;\n    align-items: center;\n    gap: 14px;\n  }\n  #clock-display {\n    font-family: var(--mono);\n    font-size: 1em;\n    color: var(--muted);\n  }\n  .btn-add-person {\n    display: flex;\n    align-items: center;\n    gap: 7px;\n    padding: 9px 18px;\n    background: var(--accent);\n    color: #000;\n    border: none;\n    border-radius: 10px;\n    font-family: var(--font);\n    font-size: 0.85em;\n    font-weight: 700;\n    letter-spacing: .4px;\n    cursor: pointer;\n    transition: opacity .15s, transform .1s;\n  }\n  .btn-add-person:hover { opacity: .88; }\n  .btn-add-person:active { transform: scale(.97); }\n\n  /* ── MAIN ── */\n  .main {\n    padding: 20px 20px 60px;\n    max-width: 1400px;\n    margin: 0 auto;\n  }\n\n  /* ── PERSONS GRID — 2 columns ── */\n  .persons-grid {\n    display: grid;\n    grid-template-columns: 1fr 1fr;\n    gap: 18px;\n  }\n\n  /* ── PERSON CARD ── */\n  .person-card {\n    background: var(--card);\n    border: 1px solid var(--border);\n    border-radius: var(--radius);\n    display: flex;\n    flex-direction: column;\n    overflow: hidden;\n    transition: border-color .2s;\n  }\n  .person-card:focus-within { border-color: var(--accent); }\n\n  .person-card-header {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    padding: 11px 14px;\n    background: rgba(255,255,255,0.03);\n    border-bottom: 1px solid var(--border);\n  }\n  .seat-badge {\n    width: 30px;\n    height: 30px;\n    border-radius: 8px;\n    background: var(--accent2);\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-size: 0.8em;\n    font-weight: 800;\n    color: white;\n    flex-shrink: 0;\n  }\n  .person-name-input {\n    flex: 1;\n    background: transparent;\n    border: none;\n    outline: none;\n    font-family: var(--font);\n    font-size: 1em;\n    font-weight: 700;\n    color: var(--text);\n    caret-color: var(--accent);\n    min-width: 0;\n  }\n  .person-name-input::placeholder { color: var(--muted); font-weight: 400; }\n  .btn-reset {\n    background: none;\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 5px 11px;\n    font-size: 0.72em;\n    font-family: var(--font);\n    font-weight: 600;\n    color: var(--muted);\n    cursor: pointer;\n    transition: all .15s;\n    flex-shrink: 0;\n  }\n  .btn-reset:hover { border-color: var(--red); color: var(--red); }\n  .btn-remove-card {\n    background: none;\n    border: none;\n    color: var(--muted);\n    font-size: 1.15em;\n    cursor: pointer;\n    padding: 4px 6px;\n    border-radius: 6px;\n    transition: color .15s;\n    flex-shrink: 0;\n    line-height: 1;\n  }\n  .btn-remove-card:hover { color: var(--red); }\n\n  /* items list */\n  .items-scroll {\n    overflow-y: auto;\n    max-height: 260px;\n    padding: 4px 0;\n    scrollbar-width: thin;\n    scrollbar-color: var(--border) transparent;\n  }\n  .items-scroll::-webkit-scrollbar { width: 4px; }\n  .items-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }\n\n  .cat-divider {\n    padding: 5px 14px 3px;\n    font-size: 0.63em;\n    font-weight: 700;\n    letter-spacing: 1.5px;\n    text-transform: uppercase;\n    color: var(--muted);\n    background: rgba(255,255,255,0.015);\n    border-bottom: 1px solid var(--border);\n    user-select: none;\n  }\n  .item-row {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    padding: 5px 14px;\n    border-bottom: 1px solid rgba(255,255,255,0.04);\n    transition: background .1s;\n  }\n  .item-row:hover { background: rgba(255,255,255,0.02); }\n  .item-row.active { background: var(--highlight); }\n\n  .item-name {\n    flex: 1;\n    font-size: 0.8em;\n    color: var(--text);\n    min-width: 0;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n    user-select: none;\n  }\n  .item-price {\n    font-family: var(--mono);\n    font-size: 0.73em;\n    color: var(--muted);\n    flex-shrink: 0;\n    min-width: 36px;\n    text-align: right;\n  }\n  .qty-controls { display: flex; align-items: center; flex-shrink: 0; }\n  .qty-btn {\n    width: 30px;\n    height: 30px;\n    border: 1px solid var(--border);\n    background: var(--surface);\n    color: var(--text);\n    font-size: 1.1em;\n    font-weight: 700;\n    cursor: pointer;\n    transition: all .1s;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n  }\n  .qty-btn:first-child { border-radius: 8px 0 0 8px; }\n  .qty-btn:last-child  { border-radius: 0 8px 8px 0; }\n  .qty-btn.plus:hover  { background: var(--accent); color: #000; border-color: var(--accent); }\n  .qty-btn.minus:hover { background: var(--border); }\n  .qty-count {\n    min-width: 28px;\n    height: 30px;\n    display: flex;\n    align-items: center;\n    justify-content: center;\n    font-family: var(--mono);\n    font-size: 0.82em;\n    font-weight: 500;\n    color: var(--accent);\n    background: rgba(240,165,0,0.08);\n    border-top: 1px solid var(--border);\n    border-bottom: 1px solid var(--border);\n    user-select: none;\n  }\n\n  /* add custom item */\n  .add-item-row {\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    padding: 7px 14px;\n    border-top: 1px solid var(--border);\n    background: rgba(255,255,255,0.015);\n  }\n  .add-item-row input {\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 6px 10px;\n    font-family: var(--font);\n    font-size: 0.78em;\n    color: var(--text);\n    outline: none;\n    transition: border-color .15s;\n  }\n  .add-item-row input:focus { border-color: var(--accent); }\n  .add-item-row input.name-in { flex: 1; min-width: 0; }\n  .add-item-row input.price-in { width: 76px; flex-shrink: 0; }\n  .add-item-row input::placeholder { color: var(--muted); }\n  .btn-add {\n    padding: 6px 13px;\n    background: var(--accent);\n    color: #000;\n    border: none;\n    border-radius: 8px;\n    font-family: var(--font);\n    font-size: 0.78em;\n    font-weight: 700;\n    cursor: pointer;\n    flex-shrink: 0;\n    transition: opacity .15s;\n  }\n  .btn-add:hover { opacity: .85; }\n\n  /* ── SUMMARY ── */\n  .summary-section {\n    border-top: 1px solid var(--border);\n    padding: 8px 14px 4px;\n    display: flex;\n    flex-direction: column;\n    gap: 3px;\n    min-height: 10px;\n  }\n  .summary-row {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    padding: 3px 0;\n  }\n  /* výrazný badge pro počet */\n  .s-qty {\n    display: inline-flex;\n    align-items: center;\n    justify-content: center;\n    min-width: 26px;\n    height: 22px;\n    padding: 0 6px;\n    border-radius: 6px;\n    background: var(--accent);\n    color: #000;\n    font-family: var(--mono);\n    font-size: 0.75em;\n    font-weight: 700;\n    flex-shrink: 0;\n  }\n  .s-name {\n    flex: 1;\n    font-size: 0.78em;\n    color: var(--text);\n    min-width: 0;\n    overflow: hidden;\n    text-overflow: ellipsis;\n    white-space: nowrap;\n  }\n  .s-price {\n    font-family: var(--mono);\n    font-size: 0.78em;\n    color: var(--accent);\n    flex-shrink: 0;\n    font-weight: 500;\n  }\n\n  /* total bar */\n  .total-bar {\n    display: flex;\n    align-items: center;\n    justify-content: space-between;\n    padding: 9px 14px;\n    background: var(--highlight);\n    border-top: 1px solid rgba(240,165,0,0.2);\n  }\n  .total-label {\n    font-size: 0.75em;\n    font-weight: 700;\n    color: var(--muted);\n    letter-spacing: .8px;\n    text-transform: uppercase;\n  }\n  .total-value {\n    font-family: var(--mono);\n    font-size: 1.2em;\n    font-weight: 500;\n    color: var(--accent);\n  }\n\n  /* payment bar */\n  .payment-bar {\n    display: flex;\n    align-items: center;\n    gap: 8px;\n    padding: 9px 14px 13px;\n  }\n  .payment-bar label {\n    font-size: 0.75em;\n    color: var(--muted);\n    flex-shrink: 0;\n  }\n  .payment-input {\n    flex: 1;\n    min-width: 0;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    border-radius: 8px;\n    padding: 7px 10px;\n    font-family: var(--mono);\n    font-size: 0.88em;\n    color: var(--text);\n    outline: none;\n    transition: border-color .15s;\n  }\n  .payment-input:focus { border-color: var(--accent); }\n  .change-badge {\n    flex-shrink: 0;\n    padding: 6px 12px;\n    border-radius: 8px;\n    font-family: var(--mono);\n    font-size: 0.82em;\n    font-weight: 500;\n    background: var(--surface);\n    border: 1px solid var(--border);\n    color: var(--muted);\n    white-space: nowrap;\n    min-width: 96px;\n    text-align: center;\n    transition: all .2s;\n  }\n  .change-badge.positive { background: rgba(46,204,113,0.12); border-color: var(--green); color: var(--green); }\n  .change-badge.negative { background: rgba(231,76,60,0.12);  border-color: var(--red);   color: var(--red);   }\n\n  ::-webkit-scrollbar { width: 6px; height: 6px; }\n  ::-webkit-scrollbar-track { background: transparent; }\n  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }\n</style>\n</head>\n<body>\n\n<header class=\"app-header\">\n  <div class=\"logo\">🍺 Terasa <span>Manager</span></div>\n  <div class=\"header-right\">\n    <div id=\"clock-display\"></div>\n    <button class=\"btn-add-person\" onclick=\"addPerson()\">＋ Přidat osobu</button>\n  </div>\n</header>\n\n<main class=\"main\">\n  <div class=\"persons-grid\" id=\"persons-grid\"></div>\n</main>\n\n<script>\nconst categories = {\n  \"🍺 Pivo\": {\n    \"Kozel 11° 0,5l\": 39, \"Kozel 11° 0,3l\": 32,\n    \"Svijany 11° 0,5l\": 38, \"Svijany 11° 0,3l\": 31,\n    \"Pilsner Urquell sklo\": 47, \"NEALKO pivo\": 40, \"Birell ochucený\": 40,\n  },\n  \"🥃 Tvrdý alkohol\": {\n    \"Zelená Božkov 0,04l\": 40, \"Tullamore Dew 0,04l\": 65,\n    \"Rum Božkov 0,04l\": 40, \"Gin 0,04l\": 60, \"Vodka Božkov 0,04l\": 40,\n    \"Jack Daniels Apple 0,04l\": 70, \"Vodka Finlandia 0,04l\": 55,\n    \"Jack Daniels Honey 0,04l\": 70, \"Švestka Božkov 0,04l\": 40,\n    \"Jack Daniels 0,04l\": 70, \"Slivovice Jelínek 0,04l\": 40,\n    \"Jameson 0,04l\": 65, \"Griotte Božkov 0,04l\": 40,\n    \"Jägermeister 0,04l\": 55, \"Vaječný likér 0,04l\": 40,\n    \"Amundseen (dle nabídky) 0,04l\": 40, \"Fernet 0,04l\": 40,\n  },\n  \"🍷 Víno\": {\n    \"Bílé víno 0,2l\": 50, \"Červené víno 0,2l\": 50,\n    \"Víno s vodou\": 50, \"Víno se sodovkou\": 60,\n  },\n  \"🥤 Nealko nápoje\": {\n    \"Limo pomeranč 0,3l\": 20, \"Relax džus 0,3l\": 35,\n    \"Tonic 0,3l\": 20, \"Redbull 0,3l\": 55,\n    \"Kofola 0,3l\": 20, \"Kofola 0,5l\": 35,\n    \"Plech dle nabídky\": 35, \"Cola 0,3l\": 20, \"Soda\": 10,\n  },\n  \"🍿 Snacks\": {\n    \"Brambůrky\": 35, \"Tyčinky\": 35, \"Křupky\": 35,\n    \"Oříšky\": 35, \"Tatranka\": 20, \"Klobása na grilu\": 105,\n  }\n};\n\nconst fullItems = {};\nfor (const items of Object.values(categories))\n  for (const [n, p] of Object.entries(items)) fullItems[n] = p;\n\nconst state = {}, customItems = {}, personNames = {};\nlet personCount = 0;\nconst LABELS = [\"A\",\"B\",\"C\",\"D\",\"E\",\"F\",\"G\",\"H\",\"I\",\"J\",\"K\",\"L\",\"M\",\"N\",\"O\",\"P\"];\n\n// Clock\nfunction updateClock() {\n  document.getElementById(\"clock-display\").textContent =\n    new Date().toLocaleTimeString(\"cs-CZ\", { hour: \"2-digit\", minute: \"2-digit\" });\n}\nsetInterval(updateClock, 1000); updateClock();\n\n// Helpers\nfunction safeKey(s) { return s.replace(/[^a-zA-Z0-9]/g, \"\"); }\nfunction getCount(id, item) { return (state[id] && state[id][item]) || 0; }\nfunction setCount(id, item, val) { if (!state[id]) state[id] = {}; state[id][item] = Math.max(0, val); }\nfunction getAllItems(id) { return { ...fullItems, ...(customItems[id] || {}) }; }\nfunction getTotal(id) {\n  let t = 0;\n  for (const [item, price] of Object.entries(getAllItems(id))) t += getCount(id, item) * price;\n  return t;\n}\n\n// Add person\nfunction addPerson() {\n  const id = personCount++;\n  state[id] = {}; customItems[id] = {}; personNames[id] = \"\";\n  const grid = document.getElementById(\"persons-grid\");\n  const card = buildCard(id);\n  grid.appendChild(card);\n  card.scrollIntoView({ behavior: \"smooth\", block: \"nearest\" });\n}\n\n// Remove person\nfunction removePerson(id) {\n  if (!confirm(\"Odebrat tuto osobu?\")) return;\n  const el = document.getElementById(`card-${id}`);\n  if (el) el.remove();\n}\n\n// Build card\nfunction buildCard(id) {\n  const label = LABELS[id % LABELS.length];\n  const card = document.createElement(\"div\");\n  card.className = \"person-card\"; card.id = `card-${id}`;\n\n  // header\n  const hdr = document.createElement(\"div\");\n  hdr.className = \"person-card-header\";\n\n  const badge = document.createElement(\"div\");\n  badge.className = \"seat-badge\"; badge.textContent = label;\n\n  const nameInput = document.createElement(\"input\");\n  nameInput.className = \"person-name-input\";\n  nameInput.placeholder = \"Jméno hosta...\";\n  nameInput.addEventListener(\"input\", () => { personNames[id] = nameInput.value.trim(); });\n\n  const resetBtn = document.createElement(\"button\");\n  resetBtn.className = \"btn-reset\"; resetBtn.textContent = \"↺ Reset\";\n  resetBtn.onclick = () => resetPerson(id, nameInput);\n\n  const removeBtn = document.createElement(\"button\");\n  removeBtn.className = \"btn-remove-card\"; removeBtn.textContent = \"✕\";\n  removeBtn.title = \"Odebrat osobu\";\n  removeBtn.onclick = () => removePerson(id);\n\n  hdr.appendChild(badge); hdr.appendChild(nameInput);\n  hdr.appendChild(resetBtn); hdr.appendChild(removeBtn);\n  card.appendChild(hdr);\n\n  // items\n  const scrollDiv = document.createElement(\"div\");\n  scrollDiv.className = \"items-scroll\"; scrollDiv.id = `items-${id}`;\n  renderItemsList(id, scrollDiv);\n  card.appendChild(scrollDiv);\n\n  // add custom\n  const addRow = document.createElement(\"div\");\n  addRow.className = \"add-item-row\";\n  const nameIn = document.createElement(\"input\");\n  nameIn.className = \"name-in\"; nameIn.placeholder = \"Vlastní položka...\";\n  const priceIn = document.createElement(\"input\");\n  priceIn.className = \"price-in\"; priceIn.placeholder = \"Kč\";\n  priceIn.type = \"number\"; priceIn.min = \"1\";\n  const addBtn = document.createElement(\"button\");\n  addBtn.className = \"btn-add\"; addBtn.textContent = \"+ Přidat\";\n  addBtn.onclick = () => {\n    const n = nameIn.value.trim(), pr = parseInt(priceIn.value);\n    if (n && pr > 0) {\n      if (!customItems[id]) customItems[id] = {};\n      customItems[id][n] = pr;\n      nameIn.value = \"\"; priceIn.value = \"\";\n      renderItemsList(id, scrollDiv);\n    }\n  };\n  addRow.appendChild(nameIn); addRow.appendChild(priceIn); addRow.appendChild(addBtn);\n  card.appendChild(addRow);\n\n  // summary\n  const sumSec = document.createElement(\"div\");\n  sumSec.className = \"summary-section\"; sumSec.id = `summary-${id}`;\n  card.appendChild(sumSec);\n\n  // total\n  const totalBar = document.createElement(\"div\");\n  totalBar.className = \"total-bar\";\n  totalBar.innerHTML = `<span class=\"total-label\">Celkem</span><span class=\"total-value\" id=\"total-${id}\">0 Kč</span>`;\n  card.appendChild(totalBar);\n\n  // payment\n  const payBar = document.createElement(\"div\");\n  payBar.className = \"payment-bar\";\n  const payLabel = document.createElement(\"label\"); payLabel.textContent = \"Platba:\";\n  const payInput = document.createElement(\"input\");\n  payInput.className = \"payment-input\"; payInput.type = \"number\";\n  payInput.min = \"0\"; payInput.placeholder = \"0 Kč\"; payInput.id = `pay-${id}`;\n  const changeBadge = document.createElement(\"div\");\n  changeBadge.className = \"change-badge\"; changeBadge.id = `change-${id}`;\n  changeBadge.textContent = \"Vrátit: —\";\n  payInput.addEventListener(\"input\", () => updateChange(id));\n  payBar.appendChild(payLabel); payBar.appendChild(payInput); payBar.appendChild(changeBadge);\n  card.appendChild(payBar);\n\n  return card;\n}\n\nfunction renderItemsList(id, container) {\n  container.innerHTML = \"\";\n  for (const [cat, items] of Object.entries(categories)) {\n    const div = document.createElement(\"div\");\n    div.className = \"cat-divider\"; div.textContent = cat;\n    container.appendChild(div);\n    for (const [item, price] of Object.entries(items))\n      container.appendChild(buildItemRow(id, item, price));\n  }\n  const custom = customItems[id] || {};\n  if (Object.keys(custom).length > 0) {\n    const div = document.createElement(\"div\");\n    div.className = \"cat-divider\"; div.textContent = \"✏️ Vlastní položky\";\n    container.appendChild(div);\n    for (const [item, price] of Object.entries(custom))\n      container.appendChild(buildItemRow(id, item, price));\n  }\n}\n\nfunction buildItemRow(id, item, price) {\n  const row = document.createElement(\"div\");\n  row.className = \"item-row\"; row.id = `row-${id}-${safeKey(item)}`;\n  if (getCount(id, item) > 0) row.classList.add(\"active\");\n\n  const nameSpan = document.createElement(\"span\");\n  nameSpan.className = \"item-name\"; nameSpan.textContent = item; nameSpan.title = item;\n\n  const priceSpan = document.createElement(\"span\");\n  priceSpan.className = \"item-price\"; priceSpan.textContent = price + \" Kč\";\n\n  const controls = document.createElement(\"div\");\n  controls.className = \"qty-controls\";\n\n  const minus = document.createElement(\"button\");\n  minus.className = \"qty-btn minus\"; minus.textContent = \"−\";\n  minus.onclick = () => changeCount(id, item, price, -1);\n\n  const countSpan = document.createElement(\"span\");\n  countSpan.className = \"qty-count\"; countSpan.id = `cnt-${id}-${safeKey(item)}`;\n  countSpan.textContent = getCount(id, item) || \"0\";\n\n  const plus = document.createElement(\"button\");\n  plus.className = \"qty-btn plus\"; plus.textContent = \"+\";\n  plus.onclick = () => changeCount(id, item, price, 1);\n\n  controls.appendChild(minus); controls.appendChild(countSpan); controls.appendChild(plus);\n  row.appendChild(nameSpan); row.appendChild(priceSpan); row.appendChild(controls);\n  return row;\n}\n\nfunction changeCount(id, item, price, delta) {\n  setCount(id, item, getCount(id, item) + delta);\n  const val = getCount(id, item);\n  const el = document.getElementById(`cnt-${id}-${safeKey(item)}`);\n  if (el) el.textContent = val;\n  const rowEl = document.getElementById(`row-${id}-${safeKey(item)}`);\n  if (rowEl) rowEl.classList.toggle(\"active\", val > 0);\n  updateSummary(id);\n}\n\nfunction updateSummary(id) {\n  const section = document.getElementById(`summary-${id}`);\n  if (!section) return;\n  section.innerHTML = \"\";\n  let total = 0;\n  for (const [item, price] of Object.entries(getAllItems(id))) {\n    const cnt = getCount(id, item);\n    if (cnt > 0) {\n      const row = document.createElement(\"div\");\n      row.className = \"summary-row\";\n\n      const qtyBadge = document.createElement(\"span\");\n      qtyBadge.className = \"s-qty\"; qtyBadge.textContent = cnt;\n\n      const nameEl = document.createElement(\"span\");\n      nameEl.className = \"s-name\"; nameEl.textContent = item; nameEl.title = item;\n\n      const priceEl = document.createElement(\"span\");\n      priceEl.className = \"s-price\"; priceEl.textContent = (cnt * price) + \" Kč\";\n\n      row.appendChild(qtyBadge); row.appendChild(nameEl); row.appendChild(priceEl);\n      section.appendChild(row);\n      total += cnt * price;\n    }\n  }\n  const totalEl = document.getElementById(`total-${id}`);\n  if (totalEl) totalEl.textContent = total + \" Kč\";\n  updateChange(id);\n}\n\nfunction updateChange(id) {\n  const total = getTotal(id);\n  const payEl = document.getElementById(`pay-${id}`);\n  const chEl  = document.getElementById(`change-${id}`);\n  if (!payEl || !chEl) return;\n  const paid = parseInt(payEl.value) || 0;\n  if (paid === 0 && total === 0) { chEl.className = \"change-badge\"; chEl.textContent = \"Vrátit: —\"; return; }\n  const change = paid - total;\n  if (change >= 0) { chEl.className = \"change-badge positive\"; chEl.textContent = `↩ ${change} Kč`; }\n  else             { chEl.className = \"change-badge negative\"; chEl.textContent = `⚠ ${Math.abs(change)} Kč chybí`; }\n}\n\nfunction resetPerson(id, nameInput) {\n  if (!confirm(\"Resetovat tuto osobu?\")) return;\n  state[id] = {}; customItems[id] = {}; personNames[id] = \"\";\n  nameInput.value = \"\";\n  const scrollDiv = document.getElementById(`items-${id}`);\n  if (scrollDiv) renderItemsList(id, scrollDiv);\n  updateSummary(id);\n  const payEl = document.getElementById(`pay-${id}`);\n  if (payEl) payEl.value = \"\";\n  updateChange(id);\n}\n\n// Init — 6 osob\nfor (let i = 0; i < 6; i++) addPerson();\n<\/script>\n</body>\n</html>" }
};
const $ = id => document.getElementById(id);

// THEME
let dark = true;
function setTheme(d) {
  dark = d;
  document.documentElement.setAttribute('data-theme', d ? 'dark' : 'light');
  const icon = d ? '🌙' : '☀️';
  $('tbtn-l').textContent = icon;
  const ta = $('tbtn-a'); if(ta) ta.textContent = icon;
  sessionStorage.setItem('theme', d ? 'dark' : 'light');
}
$('tbtn-l').addEventListener('click', () => setTheme(!dark));
const _st = sessionStorage.getItem('theme');
if(_st) setTheme(_st === 'dark');

// LOGIN
function tryLogin() {
  const u = $('lu').value.trim(), p = $('lp').value;
  if(u === CREDS.u && p === CREDS.p) {
    const remember = $('remember').checked;
    if(remember) localStorage.setItem('dash','1');
    else sessionStorage.setItem('dash','1');
    const l = $('login');
    l.style.opacity = '0';
    setTimeout(() => { l.style.display = 'none'; $('app').style.display = 'block'; startApp(); }, 350);
  } else {
    $('lerr').style.display = 'block';
    $('lp').value = ''; $('lp').focus();
  }
}
$('lbtn').addEventListener('click', tryLogin);
$('lp').addEventListener('keydown', e => { if(e.key === 'Enter') tryLogin(); });
$('lu').addEventListener('keydown', e => { if(e.key === 'Enter') $('lp').focus(); });
$('lout').addEventListener('click', () => { sessionStorage.removeItem('dash'); localStorage.removeItem('dash'); location.reload(); });
if(localStorage.getItem('dash') || sessionStorage.getItem('dash')) {
  $('login').style.display = 'none';
  $('app').style.display = 'block';
  startApp();
}

// START
function startApp() {
  $('tbtn-a').addEventListener('click', () => setTheme(!dark));
  tick(); setInterval(tick, 1000);
  buildCal(); renderLinks();
  $('fr-oopbuy').srcdoc = APPS.oopbuy.src;
  $('fr-kalk').srcdoc   = APPS.kalk.src;
  $('fr-terasa').srcdoc = APPS.terasa.src;
}

// CLOCK
function tick() {
  const n = new Date(), pad = x => String(x).padStart(2, '0');
  $('hclock').textContent = pad(n.getHours()) + ':' + pad(n.getMinutes()) + ':' + pad(n.getSeconds());
  $('wtime').textContent  = pad(n.getHours()) + ':' + pad(n.getMinutes());
  $('wyear').textContent  = n.getFullYear();
  const D  = ['Neděle','Pondělí','Úterý','Středa','Čtvrtek','Pátek','Sobota'];
  const M  = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  const Ms = ['Led','Úno','Bře','Dub','Kvě','Čvn','Čvc','Srp','Zář','Říj','Lis','Pro'];
  $('wdate').textContent = D[n.getDay()] + ', ' + n.getDate() + '. ' + M[n.getMonth()];
  $('wday').textContent  = D[n.getDay()].slice(0, 3);
  $('wmon').textContent  = Ms[n.getMonth()];
}

// CALENDAR
function buildCal() {
  const n = new Date(), y = n.getFullYear(), m = n.getMonth(), td = n.getDate();
  const M = ['Leden','Únor','Březen','Duben','Květen','Červen','Červenec','Srpen','Září','Říjen','Listopad','Prosinec'];
  $('cmon').textContent = M[m];
  const first = (new Date(y, m, 1).getDay() + 6) % 7;
  const dim   = new Date(y, m + 1, 0).getDate();
  let h = '<div class="cg">';
  ['Po','Út','St','Čt','Pá','So','Ne'].forEach(d => h += '<div class="cdn">' + d + '</div>');
  for(let i = 0; i < first; i++) h += '<div class="cd"></div>';
  for(let d = 1; d <= dim; d++) h += '<div class="cd' + (d === td ? ' today' : '') + '">' + d + '</div>';
  h += '</div>';
  $('cal').innerHTML = h;
}

// LINKS
function renderLinks() {
  const el = $('lcon');
  $('lcount').textContent = LINKS.length + (LINKS.length === 1 ? ' odkaz' : ' odkazů');
  if(!LINKS.length) { el.innerHTML = '<div class="empty">Zatím žádné odkazy — pošli mi seznam a přidám je 👋</div>'; return; }
  const cats = {};
  LINKS.forEach(l => { const c = l.cat || 'Ostatní'; if(!cats[c]) cats[c] = []; cats[c].push(l); });
  el.innerHTML = '';
  for(const [cat, items] of Object.entries(cats)) {
    let h = '<div class="lsec"><div class="lsec-hdr"><div class="lsec-t">' + cat + '</div><div class="lsec-hr"></div></div><div class="lgrid">';
    items.forEach(l => { h += '<a class="ltile" href="' + l.url + '" target="_blank"><div class="ltile-ico">' + (l.icon||'🌐') + '</div><div class="ltile-nm">' + l.name + '</div><div class="ltile-url">' + l.url.replace(/^https?:\/\//,'') + '</div></a>'; });
    h += '</div></div>';
    el.innerHTML += h;
  }
}

$('exp-kalk').addEventListener('click',   () => expand('kalk'));

function expand(k) {
  $('exptit').textContent = APPS[k].title.replace('.html','').replace(/_/g,' ');
  $('exp-dl').onclick = () => dl(k);
  $('expframe').srcdoc = APPS[k].src;
  $('expwrap').classList.add('on');
}
function dl(k) {
  const b = new Blob([APPS[k].src], {type:'text/html'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(b); a.download = APPS[k].title; a.click();
}

// NAV
[['t-home','page-home'],['t-apps','page-apps'],['t-links','page-links']].forEach(([tid,pid]) => {
  $(tid).addEventListener('click', () => {
    document.querySelectorAll('.ntab').forEach(t => t.classList.remove('on'));
    document.querySelectorAll('.page').forEach(p => p.classList.remove('on'));
    $(tid).classList.add('on'); $(pid).classList.add('on');
  });
});
</script>
